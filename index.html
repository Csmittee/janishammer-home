<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janishammer · brand universe</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773567553/favicon-32x32.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0c0c;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #fff;
        }
        .scroll-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }
        .main-coming-soon {
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: clamp(1.5rem, 6vw, 3rem);
            color: rgba(255,255,255,0.9);
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: strongBreathing 2.5s infinite ease-in-out;
            white-space: nowrap;
        }
        @keyframes strongBreathing {
            0%,100% { 
                opacity: 0.8; 
                transform: scale(1); 
                text-shadow: 0 4px 20px rgba(255,255,255,0.3);
            }
            50% { 
                opacity: 1; 
                transform: scale(1.15); 
                text-shadow: 0 8px 30px rgba(255,255,255,0.6);
            }
        }
        .brand-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.2rem;
            width: 100%;
            margin: 1rem 0 2rem;
        }
        .brand-card {
            width: 100%;
            max-width: 700px;
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: opacity 1s cubic-bezier(0.2, 0.9, 0.1, 1), transform 1.2s cubic-bezier(0.2, 0.9, 0.1, 1);
            will-change: transform, opacity;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.7);
        }
        .brand-card.revealed {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .brand-card video {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s ease;
            backface-visibility: hidden;
        }
        .brand-card:hover video {
            transform: scale(1.02);
        }
        .bottom-ensemble {
            width: 100%;
            max-width: 800px;
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            background: rgba(10,10,10,0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 80px 80px 40px 40px;
            padding: 2.2rem 1.5rem 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 40px -15px black;
        }
        .bottom-logo {
            width: 160px;
            max-width: 40%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px #000;
            transition: transform 0.5s ease;
        }
        .bottom-logo:hover {
            transform: scale(1.03);
        }
        .bottom-logo video {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        .qr-strip {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(1.2rem, 5vw, 3rem);
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }
        .qr-item {
            text-align: center;
            width: 85px;
        }
        .qr-item img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 18px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            background: white;
        }
        .qr-item img:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.8);
        }
        .qr-label {
            font-size: 0.65rem;
            margin-top: 6px;
            opacity: 0.7;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .contact-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
            width: 100%;
        }
        .contact-btn {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            color: #0b0b0b;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 15px 30px -8px black;
            border: 1px solid rgba(255,255,255,0.5);
            width: fit-content;
        }
        .contact-btn:hover {
            background: white;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 25px 35px -8px black;
        }
        .email-below {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            text-shadow: 0 2px 6px black;
            background: transparent;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 600px) {
            body { padding: 1rem 0.8rem; }
            .bottom-ensemble { padding: 1.8rem 1rem 2rem; border-radius: 50px; }
            .qr-item { width: 70px; }
            .contact-btn { font-size: 1.1rem; padding: 0.9rem 2rem; }
            .brand-card { border-radius: 32px; }
            .main-coming-soon {
                font-size: clamp(1.2rem, 5vw, 2rem);
                white-space: normal;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="main-coming-soon">coming soon</div>
        <div class="brand-grid" id="brandGrid">
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/janishammer.mp4" type="video/mp4">
                </video>
            </div>
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/Janisflow.mp4" type="video/mp4">
                </video>
            </div>
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607213/Dajequeencatcher.mp4" type="video/mp4">
                </video>
            </div>
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/Iflex.mp4" type="video/mp4">
                </video>
            </div>
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/Jade.mp4" type="video/mp4">
                </video>
            </div>
            <div class="brand-card">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/Dajeearth.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        <div class="bottom-ensemble">
            <div class="bottom-logo">
                <video autoplay loop muted playsinline>
                    <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773559861/Janis_Hammer_theme.mp4" type="video/mp4">
                </video>
            </div>
            <div class="qr-strip">
                <div class="qr-item"><img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773564045/qr-codeLine.png" alt="Line"><div class="qr-label">LINE</div></div>
                <div class="qr-item"><img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773563694/Whatsapp_QR.jpg" alt="WhatsApp"><div class="qr-label">WHATSAPP</div></div>
                <div class="qr-item"><img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773564122/qr-code_Instagram.png" alt="Instagram"><div class="qr-label">INSTAGRAM</div></div>
            </div>
            <div class="contact-block">
                <a href="mailto:info@janishammer.com" class="contact-btn">CONTACT US</a>
                <div class="email-below">info@janishammer.com</div>
            </div>
        </div>
    </div>
    <script>
        (function() {
            const cards = document.querySelectorAll('.brand-card');
            cards.forEach(card => {
                const randomX = (Math.random() * 30 - 15).toFixed(1);
                const randomY = (Math.random() * 30 + 20).toFixed(1);
                card.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.97)`;
            });
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15, rootMargin: '20px' });
            cards.forEach(card => observer.observe(card));
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) {
                    card.classList.add('revealed');
                }
            });
        })();
    </script>
    <style>.brand-card.revealed { transform: translate(0,0) scale(1) !important; }</style>
</body>
</html>
