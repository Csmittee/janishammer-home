<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janishammer · Main Hub</title>
    <!-- Central injector - loads everything -->
    <script src="https://cdn.jsdelivr.net/gh/csmittee/janishammer-central@main/js/injector.js"></script>
    <!-- Temporary inline styles for testing -->
    <style>
        :root {
            --j-primary: #e34c26;
            --j-secondary: #333333;
        }
        .test-product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-card {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .test-card video {
            width: 100%;
            max-width: 300px;
            border-radius: 16px;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .test-card h2 {
            margin: 1rem 0;
            color: var(--j-primary);
        }
        .test-card p {
            margin: 0.5rem 0;
        }
        .test-nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .test-nav-links a {
            color: var(--j-primary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .test-nav-links a:hover {
            background: var(--j-primary);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Temporary test navigation - will be replaced by injector's nav once stable -->
    <div class="test-nav-links">
        <a href="https://janishammer.com">Home</a>
        <a href="https://flow.janishammer.com">Janis Flow</a>
        <a href="https://jade.janishammer.com">Jade Coffee</a>
        <a href="https://daje.janishammer.com">Daje Games</a>
        <a href="https://janishammer.com/contact">Contact</a>
    </div>

    <div style="text-align: center; padding: 2rem;">
        <h1>🏠 Janishammer Family</h1>
        <p>Testing our multi-domain system</p>
    </div>

    <div class="test-product-grid">
        <!-- One product card for testing -->
        <div class="test-card">
            <video autoplay loop muted playsinline>
                <source src="https://res.cloudinary.com/dfiomi0lb/video/upload/v1773607212/janishammer.mp4" type="video/mp4">
            </video>
            <h2>Welcome to the Family</h2>
            <p>This page tests our central injector and navigation system.</p>
            <p>Click around to visit all subdomains!</p>
            <button class="j-btn" onclick="alert('Injector working!')">Test Injector</button>
        </div>
    </div>

    <script>
        // Log to confirm injector loaded
        console.log('✅ janishammer-home page loaded');
        // Test that central injector is working
        if (window.validateJanishammer) {
            console.log('✅ Central injector detected');
            setTimeout(() => window.validateJanishammer(), 500);
        }
    </script>
</body>
</html>
