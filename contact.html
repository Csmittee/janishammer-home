    <style>
        /* Floating brand thumbnails */
        .brand-floating-section {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 1rem;
        }
        
        .brand-thumbnails {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }
        
        .brand-thumb {
            flex: 0 0 auto;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: float 4s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        
        .brand-thumb:hover {
            transform: scale(1.1);
        }
        
        /* Different float delays */
        .brand-thumb:nth-child(1) { animation-delay: 0s; }
        .brand-thumb:nth-child(2) { animation-delay: 0.5s; }
        .brand-thumb:nth-child(3) { animation-delay: 1s; }
        .brand-thumb:nth-child(4) { animation-delay: 1.5s; }
        .brand-thumb:nth-child(5) { animation-delay: 2s; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .brand-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Center the Janis hammer thumb slightly larger */
        .brand-thumb:nth-child(3) {
            width: 100px;
            height: 100px;
        }
        
        /* Hero section */
        .contact-hero {
            text-align: center;
            padding: 3rem 2rem 1rem;
        }
        
        .contact-hero h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 4px 12px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Form container */
        .form-section {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .form-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
        }
        
        /* Zoho form container */
        #zf_div_vGIqcdbeCPQhozpX_nE0HsQjzgVAqY58jFWyNKjpiiE {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: transparent;
        }
        
        /* QR code section */
        .qr-section {
            max-width: 1280px;
            margin: 4rem auto;
            padding: 2rem;
            text-align: center;
        }
        
        .qr-section h2 {
            font-size: 2rem;
            color: white;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        
        .qr-grid {
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        
        .qr-item {
            text-align: center;
        }
        
        .qr-item img {
            width: 150px;
            height: 150px;
            border-radius: 24px;
            padding: 0.5rem;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .qr-item img:hover {
            transform: scale(1.05);
        }
        
        .qr-item p {
            margin-top: 0.5rem;
            color: white;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .contact-hero h1 { font-size: 2.2rem; }
            .brand-thumb { width: 60px; height: 60px; }
            .brand-thumb:nth-child(3) { width: 80px; height: 80px; }
            .form-card { padding: 1rem; }
        }

            <script type="text/javascript">
            (function() {
                try{
                    var f = document.createElement("iframe");

                                utmPm = ( ZFAdvLead.isSameDomian && ( ZFAdvLead.utmcustPNameArr.indexOf(utmPm) == -1 ) ) ? "zf_" + utmPm : utmPm;
                                var utmVal = zfutm_zfAdvLead.zfautm_gC_enc( ZFAdvLead.utmPNameArr[ prmIdx ] );
                                if ( typeof utmVal !== "undefined" ) {
                                  if ( utmVal != "" ) {
                                    if(ifrmSrc.indexOf('?') > 0){

                                    }else{

                        if ( typeof ZFLead !== "undefined" && typeof zfutm_zfLead !== "undefined" ) {

                    f.style.transition="all 0.5s ease";

                    var d = document.getElementById("zf_div_vGIqcdbeCPQhozpX_nE0HsQjzgVAqY58jFWyNKjpiiE");
                    d.appendChild(f);
                    window.addEventListener('message', function (){
                        var evntData = event.data;

                                if ( (iframe.src).indexOf('formperma') > 0 && (iframe.src).indexOf(zf_perma) > 0 ) {
                                    var prevIframeHeight = iframe.style.height;
                                    var zf_tout = false;
                                    if( zf_ifrm_data.length == 3 ) {
